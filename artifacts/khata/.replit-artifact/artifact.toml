kind = "web"
previewPath = "/"
title = "Khata"
version = "1.0.0"
id = "artifacts/khata"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21533

[services.development]
run = "pnpm --filter @workspace/khata run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/khata", "run", "build" ]
serve = "static"
publicDir = "artifacts/khata/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21533"
BASE_PATH = "/"
